# Validation workflow: test-build the vllm-omni NPU CI image
# (docker/vllm-omni/Dockerfile.npu.ci.a3) to confirm it builds successfully.
#
# The Dockerfile clones vllm-omni at build time (default branch: main) instead
# of COPYing a local context, so the build context here is just this repo.
# On success the image is pushed to quay.io/fayeomni/temp:omni-a3-ci.
#
# The .a3 variant targets Ascend A3 (arm64), so it builds on an arm64 runner.
name: Test CI image build

on:
  workflow_dispatch:
    inputs:
      vllm_ascend_image:
        description: 'Base vllm-ascend image repo (FROM)'
        type: string
        default: 'quay.io/atlas-ci/vllm-ascend'
      vllm_ascend_tag:
        description: 'Base vllm-ascend tag (FROM)'
        type: string
        default: 'v0.23.0-4885d8e-a3'
      vllm_omni_ref:
        description: 'vllm-omni branch/tag/commit to clone into the image'
        type: string
        default: 'main'
  pull_request:
    paths:
      - 'docker/vllm-omni/Dockerfile.npu.ci.a3'
      - '.github/workflows/test_build_omni_ci_image.yaml'

permissions:
  contents: read

jobs:
  test-build:
    name: build vllm-omni CI image (arm64)
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Base image lives on quay.io (private), so log in to pull it.
      - name: Login to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ vars.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/vllm-omni/Dockerfile.npu.ci.a3
          platforms: linux/arm64
          push: true
          provenance: false
          tags: quay.io/fayeomni/temp:omni-a3-ci
          build-args: |
            VLLM_ASCEND_IMAGE=${{ inputs.vllm_ascend_image || 'quay.io/atlas-ci/vllm-ascend' }}
            VLLM_ASCEND_TAG=${{ inputs.vllm_ascend_tag || 'v0.23.0-4885d8e-a3' }}
            VLLM_OMNI_REF=${{ inputs.vllm_omni_ref || 'main' }}
